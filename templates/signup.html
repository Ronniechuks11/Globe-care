<!DOCTYPE html>
<html>

<head>
    <title>Register - GLOBE-CARE</title>

    <style>

        body{
            margin:0;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:#0a0a0a;

            font-family:Arial,sans-serif;
            color:white;
        }

        .form-box{
            background:rgba(255,255,255,0.05);
            padding:40px;
            border-radius:15px;
            width:350px;
        }

        h1{
            text-align:center;
            color:#4da6ff;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#1e90ff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="form-box">

        <h1>Sign up</h1>

        <form>

            <input type="text" placeholder="Full Name">

            <input type="email" placeholder="Email">

            <input type="tel" placeholder="Phone Number">

            <button type="submit">
                Sign up
            </button>

        </form>

    </div>

</body>

</html>
